<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summarize AI Settings</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent 400px),
                radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.1), transparent 400px);
        }

        .settings-card {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border-radius: var(--border-radius-2xl);
            border: 1px solid var(--glass-border);
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-xl), 0 0 40px rgba(0, 0, 0, 0.3);
        }

        .setting-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--glass-border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        select:focus,
        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
            background: var(--card-bg-hover);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        #save-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: var(--shadow-md), 0 0 20px rgba(99, 102, 241, 0.3);
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        #save-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg), 0 0 30px rgba(99, 102, 241, 0.4);
        }

        #status {
            text-align: center;
            font-size: 13px;
            color: var(--success);
            margin-top: 20px;
            min-height: 20px;
        }

        .premium-badge {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .version-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 12px;
            align-self: center;
        }
    </style>
</head>

<body>
    <div class="settings-card">
        <header class="header">
            <div class="logo-area">
                <h1>Settings</h1>
                <span id="version-label" class="version-label"></span>
            </div>
        </header>

        <nav class="tabs" role="tablist">
            <button id="settings-tab" class="tab-button active" role="tab" aria-selected="true"
                aria-controls="settings-section">
                <i class="material-icons-round">settings</i>
                Settings
            </button>
            <button id="prompts-tab" class="tab-button" role="tab" aria-selected="false"
                aria-controls="prompts-section">
                <i class="material-icons-round">edit</i>
                Custom Prompts
            </button>
            <button id="stats-tab" class="tab-button" role="tab" aria-selected="false"
                aria-controls="stats-section">
                <i class="material-icons-round">analytics</i>
                Statistics
            </button>
        </nav>

        <div id="settings-section" class="tab-content active" role="tabpanel" aria-labelledby="settings-tab">
            <form id="settings-form">
            <div class="setting-group">
                <label for="summary-length">Preferred Summary Length</label>
                <select id="summary-length">
                    <option value="short">Short & Punchy</option>
                    <option value="medium" selected>Balanced (Standard)</option>
                    <option value="long">Comprehensive Detail</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="summary-tone">Summary Tone</label>
                <select id="summary-tone">
                    <option value="professional" selected>💼 Professional & Academic</option>
                    <option value="casual">👋 Casual & Friendly</option>
                    <option value="creative">🚀 Creative & Engaging</option>
                    <option value="minimalist">🎯 Ultra-Minimalist</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="output-language">Output Language</label>
                <select id="output-language">
                    <option value="en">English (US/UK)</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                    <option value="pt">Portuguese (Português)</option>
                    <option value="ja">Japanese (日本語)</option>
                    <option value="zh">Chinese (中文)</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="ai-model">AI Engine <span class="premium-badge">PRO</span></label>
                <select id="ai-model">
                    <option value="Summerizer">Summarize Native (Default)</option>
                    <option value="gpt-4o">GPT-4o (High Precision)</option>
                    <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo (Fast)</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="api-key">AIML API Key</label>
                <input type="text" id="api-key" placeholder="Enter your API key here..." required>
                <small style="color: var(--text-muted); font-size: 11px; margin-top: 4px; display: block;">
                    Get your key at <a href="https://aimlapi.com" target="_blank"
                        style="color: var(--primary);">aimlapi.com</a>
                </small>
            </div>

            <div class="setting-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="dark-mode" checked>
                    <span>Enable Dark Mode Aesthetics</span>
                </label>
            </div>

            <div class="setting-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="auto-copy">
                    <span>Auto-copy summary to clipboard</span>
                </label>
            </div>
            <div class="setting-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="auto-tag">
                    <span>Auto-generate tags from AI keywords</span>
                </label>
            </div>

            <button type="submit" class="buttons" id="save-btn">
                <i class="material-icons-round">save</i>
                Save Configuration
            </button>
        </form>
        </div>

        <div id="prompts-section" class="tab-content" role="tabpanel" aria-labelledby="prompts-tab">
            <div class="prompts-manager">
                <div class="prompts-header">
                    <h3>Custom Prompts</h3>
                    <button id="add-prompt-btn" class="buttons secondary-btn">
                        <i class="material-icons-round">add</i>
                        New Prompt
                    </button>
                </div>
                <div id="prompts-list" class="prompts-list">
                    <!-- Custom prompts will be loaded here -->
                </div>
            </div>
        </div>

        <section id="stats-section" class="tab-content" role="tabpanel" aria-labelledby="stats-tab">
            <div class="stats-dashboard">
                <div class="stat-card">
                    <i class="material-icons-round">description</i>
                    <div class="stat-info">
                        <span id="total-summaries" class="stat-number">0</span>
                        <label>Total Summaries</label>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="material-icons-round">schedule</i>
                    <div class="stat-info">
                        <span id="total-time" class="stat-number">0m</span>
                        <label>Time Saved</label>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="material-icons-round">bookmark</i>
                    <div class="stat-info">
                        <span id="bookmarked-count" class="stat-number">0</span>
                        <label>Bookmarked</label>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="material-icons-round">psychology</i>
                    <div class="stat-info">
                        <span id="ai-interactions" class="stat-number">0</span>
                        <label>AI Interactions</label>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="material-icons-round">trending_up</i>
                    <div class="stat-info">
                        <span id="avg-session-time" class="stat-number">0m</span>
                        <label>Avg. Session Time</label>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="material-icons-round">model_training</i>
                    <div class="stat-info">
                        <span id="most-used-model" class="stat-number">-</span>
                        <label>Most Used Model</label>
                    </div>
                </div>
            </div>
            <div class="analytics-charts">
                <div class="chart-container">
                    <h4>Usage Over Time (Last 7 Days)</h4>
                    <canvas id="usage-chart" width="400" height="200"></canvas>
                </div>
                <div class="chart-container">
                    <h4>Model Distribution</h4>
                    <canvas id="model-chart" width="400" height="200"></canvas>
                </div>
            </div>
            <div class="stats-details">
                <div class="stats-actions">
                    <h3>Recent Activity</h3>
                    <button id="reset-stats-btn" class="text-btn">
                        <i class="material-icons-round">refresh</i>
                        Reset Statistics
                    </button>
                </div>
                <div id="recent-activity" class="activity-list"></div>
            </div>
        </section>
        <div id="status"></div>
    </div>
    <script src="options.js"></script>
</body>

</html>
