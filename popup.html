<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summarize AI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="extension-popup">
        <header class="header">
            <div class="logo-area">
                <h1>Summarize AI</h1>
                <div id="autocopy-chip" class="chip" style="display: none;">
                    <i class="material-icons-round">content_paste</i>
                    Auto-Copy
                </div>
            </div>
            <div class="header-actions">
                <button id="reading-mode-toggle" class="icon-btn" title="Reading Mode">
                    <i class="material-icons-round">auto_stories</i>
                </button>
                <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                    <i class="material-icons-round">light_mode</i>
                </button>
                <button id="settings-trigger" class="icon-btn" title="Settings">
                    <i class="material-icons-round">settings</i>
                </button>
            </div>
        </header>

        <nav class="tabs" role="tablist">
            <button id="summarize-tab" class="tab-button active" role="tab" aria-selected="true"
                aria-controls="summarize-section">
                <i class="material-icons-round">description</i>
                Summarize
            </button>
            <button id="history-tab" class="tab-button" role="tab" aria-selected="false"
                aria-controls="history-section">
                <i class="material-icons-round">history</i>
                History
            </button>
        </nav>

        <main id="summarize-section" class="tab-content active" role="tabpanel" aria-labelledby="summarize-tab">
            <div id="stats-bar" class="stats-bar">
                <div class="stat">
                    <span id="stat-count">0</span>
                    <label>Summaries</label>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span id="stat-time">0m</span>
                    <label>Saved</label>
                </div>
            </div>
            <div id="reading-time" style="display:none;"></div>
            <div id="last-updated-container" class="last-updated" style="display: none;">
                <i class="material-icons-round">schedule</i>
                <span id="last-updated-time"></span>
            </div>

            <div id="insights-bar" class="insights-bar" style="display: none;">
                <div class="insight-pill">
                    <i class="material-icons-round">category</i>
                    <span id="content-category">General</span>
                </div>
                <div class="insight-pill">
                    <i class="material-icons-round">psychology</i>
                    <span id="content-sentiment">Neutral</span>
                </div>
            </div>

            <div class="summary-field">

                <textarea id="summary" readonly
                    placeholder="The AI summary will appear here once you click the button below..."
                    aria-label="Summary output"></textarea>

                <!-- AI Chat Interface (Initially Hidden) -->
                <div id="chat-container" class="chat-container" style="display: none;">
                    <div class="chat-header">
                        <h4>AI Assistant</h4>
                        <button id="clear-chat-btn" class="icon-btn tiny" title="Clear Chat">
                            <i class="material-icons-round">delete_outline</i>
                        </button>
                    </div>
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Ask a follow-up question..."
                            aria-label="Chat input">
                        <button id="send-chat-btn" class="icon-btn" title="Send Question">
                            <i class="material-icons-round">send</i>
                        </button>
                    </div>
                </div>

                <!-- Voice Reader Controls -->
                <div id="tts-controls" class="tts-controls" style="display: none;">
                    <button id="read-aloud-btn" class="icon-btn" title="Read Aloud">
                        <i class="material-icons-round">volume_up</i>
                    </button>
                    <button id="pause-tts-btn" class="icon-btn" title="Pause" style="display: none;">
                        <i class="material-icons-round">pause</i>
                    </button>
                    <button id="stop-tts-btn" class="icon-btn" title="Stop" style="display: none;">
                        <i class="material-icons-round">stop</i>
                    </button>
                    <select id="voice-select" class="voice-select" aria-label="Select Voice"></select>
                </div>

                <div id="count-container" class="count-container" style="display: none;">
                    <span id="char-count">0 characters</span>
                    <span class="count-divider">•</span>
                    <span id="word-count">0 words</span>
                </div>
                <div id="status-steps" class="status-steps" style="display: none;">
                    <div class="step" data-step="1">
                        <i class="material-icons-round">description</i>
                        <span>Reading page content...</span>
                    </div>
                    <div class="step" data-step="2">
                        <i class="material-icons-round">psychology</i>
                        <span>Analyzing with AI...</span>
                    </div>
                    <div class="step" data-step="3">
                        <i class="material-icons-round">spellcheck</i>
                        <span>Formatting results...</span>
                    </div>
                </div>
                <div id="skeleton-loader" class="skeleton-container" style="display: none;">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>

            <div id="links-section" class="links-section" style="display:none;">
                <div class="section-header">
                    <h3>Key Links Extracted</h3>
                    <button id="copy-all-links" class="text-btn tiny" title="Copy all links to clipboard">
                        <i class="material-icons-round">content_copy</i>
                        Copy All
                    </button>
                </div>
                <ul id="links-list" aria-label="Extracted links"></ul>
            </div>

            <div class="main-actions">
                <div class="main-button-group">
                    <button id="summarize-btn" class="buttons" aria-label="Summarize current page">
                        <i class="material-icons-round">auto_awesome</i>
                        Generate Summary
                    </button>
                    <button id="regenerate-btn" class="buttons secondary-btn" style="display: none;"
                        title="Regenerate Summary">
                        <i class="material-icons-round">refresh</i>
                    </button>
                </div>

                <div class="export-grid">
                    <button id="copy-btn" class="buttons" aria-label="Copy to clipboard">
                        <i class="material-icons-round">content_copy</i>
                        Copy
                    </button>
                    <button id="download-btn" class="buttons" aria-label="Download TXT">
                        <i class="material-icons-round">download</i>
                        Text
                    </button>
                    <button id="pdf-btn" class="buttons" aria-label="Download PDF">
                        <i class="material-icons-round">picture_as_pdf</i>
                        PDF
                    </button>
                    <button id="markdown-btn" class="buttons" aria-label="Download Markdown">
                        <i class="material-icons-round">article</i>
                        MD
                    </button>
                    <button id="share-btn" class="buttons" aria-label="Share summary">
                        <i class="material-icons-round">share</i>
                        Share
                    </button>
                </div>
            </div>
        </main>

        <section id="history-section" class="tab-content" style="display:none;" role="tabpanel"
            aria-labelledby="history-tab">
            <div class="history-controls">
                <div class="search-box">
                    <i class="material-icons-round">search</i>
                    <input type="text" id="history-search" placeholder="Search history..." aria-label="Search history">
                    <button id="clear-search-btn" class="icon-btn tiny" title="Clear Search" style="display: none;">
                        <i class="material-icons-round">close</i>
                    </button>
                </div>
                <button id="clear-history-btn" class="text-btn">
                    <i class="material-icons-round">delete_sweep</i>
                    Clear All
                </button>
            </div>
            <div id="history-list" aria-label="Summary history"></div>
            <button id="scroll-top-btn" class="icon-btn fab" title="Scroll to Top" style="display: none;">
                <i class="material-icons-round">keyboard_arrow_up</i>
            </button>
        </section>
    </div>
    <div id="toast-container"></div>
    <button id="exit-reading-mode">
        <i class="material-icons-round">close</i>
        Exit Reading Mode
    </button>
    <script src="popup.js"></script>
</body>

</html>
